<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>islahul.com</title>
    <meta
      name="description"
      content="Personal website for Islahul Hassan Zunjani."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe6;
        --panel: #fffaf2;
        --text: #1c1917;
        --muted: #57534e;
        --accent: #9a3412;
        --border: #d6d3d1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(251, 191, 36, 0.18), transparent 35%),
          linear-gradient(180deg, #fdf8f1 0%, var(--bg) 100%);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(680px, 100%);
        padding: 48px 40px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(28, 25, 23, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.5rem, 7vw, 4.5rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        font-size: 1.1rem;
        line-height: 1.7;
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }

      .meta {
        margin-top: 24px;
        font-size: 0.95rem;
      }

      @media (max-width: 640px) {
        main {
          padding: 32px 24px;
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Islahul Hassan Zunjani</h1>
      <p>
        This site has been simplified to a single static HTML page. You can
        reach me at
        <a href="mailto:islahulzunjani@gmail.com">islahulzunjani@gmail.com</a>.
      </p>
      <p class="meta">No framework, no build step, just one file.</p>
    </main>
  </body>
</html>
